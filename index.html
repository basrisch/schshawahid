<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام الشواهد المدرسية </title>
  <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/u/0/d/1MHJi0LeO90YSWA5ZPZ0dca5Tiw1WCcAw">
</head>
<body style="margin:0; padding:0; overflow:hidden;">

<iframe 
    src="https://script.google.com/macros/s/AKfycbxgfIFRbbQSFDtN19VQOr6oEzXiG-QeAbnzdu1MTRrOfvTBgUvwqAzfHf55Wj7zQgL0Kw/exec"
    width="100%"
    height="100%"
    allowfullscreen="true"
    style="position:fixed; top:0; left:0; width:100%; height:100%; border:none;">
</iframe>

<script>
window.onload = function () {
    document.querySelector('iframe').requestFullscreen().catch((err) => {
        console.error(`Error attempting to enable full-screen mode: ${err.message}`);
    });
};
</script>

</body>
</html>
